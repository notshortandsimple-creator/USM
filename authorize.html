<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Authorization Required</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#1d1b17;
    color:#d6c89d;

    font-family:'Special Elite', cursive;

    overflow:hidden;
}

.background{
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.72)),
    url('assets/paper.jpg');

    background-size:cover;

    filter:blur(2px);

    transform:scale(1.05);
}

.panel{
    position:relative;

    width:500px;
    max-width:90%;

    padding:40px;

    border:2px solid rgba(214,200,157,0.3);

    background:rgba(20,18,15,0.92);

    box-shadow:
    0 0 40px rgba(0,0,0,0.6),
    inset 0 0 30px rgba(255,255,255,0.03);

    z-index:2;
}

h1{
    margin-top:0;
    letter-spacing:3px;
}

.warning{
    color:#b64040;
    margin:20px 0;
    font-size:0.95rem;
}

input{
    width:100%;

    padding:14px;

    margin-top:10px;

    background:#111;

    border:1px solid #555;

    color:#d6c89d;

    font-family:inherit;

    font-size:1rem;
}

button{
    margin-top:20px;

    width:100%;

    padding:14px;

    border:none;

    background:#3d4a33;

    color:#d6c89d;

    font-family:inherit;

    font-size:1rem;

    cursor:pointer;

    transition:0.2s;
}

button:hover{
    background:#556647;
}

.error{
    margin-top:15px;
    color:#d9534f;
    display:none;
}

.access{
    margin-top:15px;
    color:#7ed957;
    display:none;
}

.stamp{
    position:absolute;
    top:25px;
    right:25px;

    border:3px solid #8b1e1e;

    color:#8b1e1e;

    padding:8px 14px;

    transform:rotate(-8deg);

    font-weight:bold;

    opacity:0.8;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="panel">

<div class="stamp">CLASSIFIED</div>

<h1>AUTHORIZATION REQUIRED</h1>

<p>
MILITARY ASSISTANCE COMMAND, VIETNAM
<br>
SECURE ARCHIVE TERMINAL
</p>

<div class="warning">
UNAUTHORIZED ACCESS TO THIS MATERIAL IS PROHIBITED
UNDER FEDERAL SECURITY ACTS.
</div>

<input type="password" id="passphrase" placeholder="ENTER PASSPHRASE">

<button onclick="checkPassphrase()">
AUTHORIZE ACCESS
</button>

<div class="error" id="error">
INVALID PASSPHRASE
</div>

<div class="access" id="access">
ACCESS GRANTED
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const doc = params.get("doc");

const passphrases = {
    falcon: "Moscow Mule",
    intel: "silentwatch",
    comms: "deltaecho"
};

const pages = {
    falcon: "operation-falcon-core.html",
    intel: "intel-processing-unit.html",
    comms: "comms-encryption-suite.html"
};

function checkPassphrase(){

    const input =
    document.getElementById("passphrase").value;

    if(input === passphrases[doc]){

        document.getElementById("access").style.display = "block";

        setTimeout(() => {

            window.location.href = pages[doc];

        }, 1200);

    }else{

        document.getElementById("error").style.display = "block";

    }
}

</script>

</body>
</html>
